port: 7880
bind_addresses:
  - 127.0.0.1
rtc:
  port_range_start: 50000
  port_range_end: 50200
  tcp_port: 7881
  use_external_ip: false

# Keys are loaded from LIVEKIT_KEYS environment variable at runtime.
# Format: LIVEKIT_KEYS="api_key: api_secret"
# Example: LIVEKIT_KEYS="mykey123: mysecret456"
keys: {}

logging:
  level: info

room:
  auto_create: true
  empty_timeout: 300
  max_participants: 20

turn:
  enabled: false
